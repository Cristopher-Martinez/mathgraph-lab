name: Deploy MathGraph Lab

on:
    push:
        branches: [master]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: cristopher-martinez/mathgraph-lab

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

            - name: Deploy to VPS
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: root
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      cd /app/mathgraph-lab || mkdir -p /app/mathgraph-lab && cd /app/mathgraph-lab

                      # Pull latest image
                      docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

                      # Create .env if not exists
                      if [ ! -f .env ]; then
                        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
                        echo "AUTH_USERS=${{ secrets.AUTH_USERS }}" >> .env
                      fi

                      # Create docker-compose.yml
                      cat > docker-compose.yml << 'COMPOSE'
                      services:
                        mathgraph:
                          image: ghcr.io/cristopher-martinez/mathgraph-lab:latest
                          container_name: mathgraph-lab
                          restart: unless-stopped
                          ports:
                            - "3002:3001"
                          volumes:
                            - mathgraph-data:/data
                          environment:
                            - NODE_ENV=production
                            - PORT=3001
                            - DATABASE_URL=file:/data/mathgraph.db
                            - GEMINI_API_KEY=${GEMINI_API_KEY}
                            - AUTH_USERS=${AUTH_USERS}
                      volumes:
                        mathgraph-data:
                      COMPOSE

                      # Deploy
                      docker compose up -d --pull always --remove-orphans

                      # Wait and check health
                      sleep 5
                      docker ps --filter name=mathgraph-lab --format "{{.Status}}"
